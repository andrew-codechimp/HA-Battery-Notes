name: "Release"

on:
  release:
    types:
      - "published"

permissions: {}

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v6"

      - name: "Setup Node.js"
        uses: "actions/setup-node@v4"
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "custom_components/battery_notes/frontend/package-lock.json"

      - name: "Build frontend"
        shell: "bash"
        run: |
          npm ci --prefix "${{ github.workspace }}/custom_components/battery_notes/frontend"
          npm run build --prefix "${{ github.workspace }}/custom_components/battery_notes/frontend"

      - name: "Adjust version number"
        shell: "bash"
        run: |
          yq -i -o json '.version="${{ github.event.release.tag_name }}"' \
            "${{ github.workspace }}/custom_components/battery_notes/manifest.json"

      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/battery_notes"
          zip battery_notes.zip -r ./ \
            -x "frontend/src/*" \
            -x "frontend/node_modules/*" \
            -x "frontend/package.json" \
            -x "frontend/package-lock.json" \
            -x "frontend/tsconfig.json" \
            -x "frontend/rollup.config.mjs"

      - name: "Upload the ZIP file to the release"
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: ${{ github.workspace }}/custom_components/battery_notes/battery_notes.zip
